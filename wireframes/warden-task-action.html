<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Warden — Yoga Photo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="phone">
  <div class="topbar">
    <a href="warden-home.html" class="nav-back">←</a>
    <div style="flex:1; text-align:center;">
      <h1>Yoga Photo</h1>
      <div class="sub">Yoga session — proof photo</div>
    </div>
    <span></span>
  </div>

  <div class="content">
    <div class="note-bar">
      ⏰ Window: 5:15 – 7:45 am · Now 5:42 am · 2 hr 3 min remaining
    </div>

    <div class="camera-placeholder" onclick="alert('On phone: opens device camera directly. Gallery is blocked.')">
      <div class="icon">📷</div>
      <div class="text">Tap to open camera</div>
      <div class="text" style="font-size:11px; margin-top:4px;">(Camera only — gallery disabled)</div>
    </div>

    <div class="card">
      <div style="font-weight:600; margin-bottom:8px;">Requirements</div>
      <ul style="padding-left:18px; font-size:13px; line-height:1.8; color:#4b5563;">
        <li>All students visible in frame</li>
        <li>Camera only — no gallery upload</li>
        <li>Date and time stamped automatically</li>
      </ul>
    </div>

    <button class="btn disabled" disabled>
      📤 Upload (take photo first)
    </button>
    <a href="warden-home.html" class="btn secondary">Cancel</a>
  </div>
</div>
</body>
</html>
